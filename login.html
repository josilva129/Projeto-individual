<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/login.css" />

    <title>Login</title>
  </head>
  <body>
    <div class="main">
      <div class="container">
        <h1>Entrar</h1>
        <div class="campos">

            <label for="input_email">ENDEREÇO DE E-MAIL</label>
            <input type="text" id="input_email" />

            <label for="input_senha">SENHA</label>
            <input type="password" id="input_senha" />

            <p><a href="#">Esqueceu a senha?</a></p>

            <button class="primary-button">ENTRAR</button>

            <div class="linha"></div>

            <div class="cadastrar">
              <h2>Não tem uma conta?</h2>
              <button class="second-button">CADASTRE-SE</button>
            </div>
        </div>
        
      </div>
    </div>
  </body>
</html>
