<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/quiz.css">
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon">
    <title>Quiz - Harry Potter</title>
</head>

<body>

    <header>
        <div class="logo">⚡ WizardWorld</div>

        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#casas">Casas</a></li>
                <li><a href="#personagens">Personagens</a></li>
                <li><a href="./telaQuiz.html">Quiz</a></li>
                <li><a href="./dashboard.html">Dashboard</a></li>
            </ul>
        </nav>

        <div class="buttons">
            <a class="btn login" href="./login.html">Login</a>
            <a class="btn cadastro" href="./cadastrar.html">Cadastro</a>
        </div>
    </header>

    <div class="main">
        <div class="quiz">
            <h1 id="numeroQuestao"></h1>
            
            <div class="perguntas">
                <div class="imagem">
                    <h2 id="perguntasDinamicas"></h2>
                </div>

                <div class="alternativas">
                    <div class="opcao">
                        <input type="radio" name="questao" id="op1" value='0'>
                        <label for="op1" id="alt1"></label>
                    </div>

                    <div class="opcao">
                        <input type="radio"  name="questao" id="op2" value='1'>
                        <label for="op2" id="alt2"></label>
                    </div>

                    <div class="opcao">
                        <input type="radio"  name="questao" id="op3" value='2'>
                        <label for="op3" id="alt3"></label>
                    </div>

                    <div class="opcao">
                        <input type="radio"  name="questao" id="op4" value='3'>
                        <label for="op4" id="alt4"></label>
                    </div>

                    <button onclick="proxima()" id="textoBotao"></button>
                </div>
            </div>

        </div>
    </div>

</body>

</html>

<script src="/js/quiz.js"></script>
