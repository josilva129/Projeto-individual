<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/telaQuiz.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/favicon.png"
      type="image/x-icon"
    />
    <title>Quiz - Harry Potter</title>
  </head>

  <body>
    <header>
      <div class="logo">⚡ WizardWorld</div>

      <nav>
        <ul>
          <li><a href="./home.html">Home</a></li>
          <li><a href="./home.html#casas">Casas</a></li>
          <li><a href="./home.html#personagens">Personagens</a></li>
          <li><a href="./telaQuiz.html">Quiz</a></li>
          <li><a href="./dashboard.html">Dashboard</a></li>
        </ul>
      </nav>

      <div class="buttons">
        <div class="loginCadastro">
          <a class="btn login" href="./login.html">Login</a>
          <a class="btn cadastro" href="./cadastrar.html">Cadastro</a>
        </div>
        <a onclick="encerrarSessao()" class="btn sair">Sair</a>
      </div>
    </header>

    <div id="acessoNegado">
      <h1>Acesso negado! Faça login para visualizar essa pagina</h1>
      <p id="redirecionando"></p>
    </div>

    <div class="main">
      <div class="quiz">
        <h1>Suas tentativas</h1>

        <div class="tabela card">
          <div class="linha cabecalho">
            <div>Pontuação</div>
            <div>Resultado</div>
            <div>Data</div>
          </div>

          <div id="linhasResultados"></div>
        </div>

        <span>10 perguntas</span>

        <a href="./quiz.html">Iniciar Quiz</a>
      </div>
    </div>
